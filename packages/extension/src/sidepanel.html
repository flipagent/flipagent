<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>flipagent</title>
<style>
	:root { color-scheme: light dark; --bg:#fff; --bg2:#fafafa; --fg:#111; --muted:#888; --border:#e5e5e5; --accent:#0064d2; --ok:#2ea44f; --warn:#d29922; --err:#cf222e; }
	@media (prefers-color-scheme: dark) { :root { --bg:#1a1a1a; --bg2:#222; --fg:#eee; --muted:#888; --border:#333; } }
	* { box-sizing: border-box; }
	html, body { margin:0; padding:0; height:100%; background:var(--bg); color:var(--fg); font-family:system-ui,-apple-system,"Segoe UI",sans-serif; font-size:13px; line-height:1.45; }
	#app { display:flex; flex-direction:column; height:100vh; }

	header { padding:12px 14px; border-bottom:1px solid var(--border); }
	header .brand { font-weight:700; letter-spacing:0.04em; }

	.pills { padding:10px 14px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:6px; }
	.row { display:flex; align-items:center; gap:8px; font-size:12px; }
	.row .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; background:#bbb; }
	.row .dot.ok { background:var(--ok);} .row .dot.warn { background:var(--warn);} .row .dot.err { background:var(--err);} .row .dot.idle { background:#bbb; }
	.row .label { flex:1; }

	.now { padding:14px; margin:12px 12px 0; background:var(--bg2); border:1px solid var(--border); border-radius:10px; }
	.now[hidden] { display:none; }
	.now .head { font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); margin-bottom:6px; }
	.now .item { font-size:14px; font-weight:600; margin-bottom:6px; word-break:break-all; }
	.now .status-line { display:flex; align-items:center; gap:6px; font-size:13px; padding:4px 0; }
	.now .ind { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
	.now .ind.live { background:var(--warn); animation:pulse 1.4s ease-in-out infinite; }
	.now .ind.ok { background:var(--ok); } .now .ind.err { background:var(--err); } .now .ind.idle { background:#bbb; }
	.now .meta { font-size:12px; color:var(--muted); margin-top:4px; }
	.now .actions { margin-top:10px; display:flex; gap:6px; }
	.now button { padding:6px 11px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--fg); font-size:12px; cursor:pointer; }
	.now button.danger { border-color:var(--err); color:var(--err); }
	@keyframes pulse { 0%,100% { opacity:1; transform:scale(1);} 50% { opacity:0.4; transform:scale(0.7);} }

	section.feed { flex:1; min-height:0; overflow-y:auto; padding:8px 14px 12px; }
	.feed h2 { margin:8px 0 6px; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); font-weight:600; }
	.event { padding:6px 9px; border-radius:6px; background:rgba(127,127,127,0.06); margin-bottom:5px; font-size:12px; }
	.event .ts { color:var(--muted); font-size:11px; margin-right:6px; }
	.event.error { border-left:3px solid var(--err); }
	.event.success { border-left:3px solid var(--ok); }
	.event pre { margin:3px 0 0 0; font-size:11px; white-space:pre-wrap; word-break:break-all; color:var(--muted); }
	.muted { color:var(--muted); }

	details.settings { border-top:1px solid var(--border); }
	details.settings summary { cursor:pointer; padding:10px 14px; color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:0.06em; }
	details.settings .body { padding:0 14px 14px; }
	details.settings label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; color:var(--muted); margin:8px 0 4px; }
	details.settings input { width:100%; padding:7px 9px; border:1px solid var(--border); border-radius:5px; background:var(--bg); color:var(--fg); font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:12px; }
	details.settings .actions { margin-top:10px; display:flex; gap:6px; }
	details.settings button { padding:7px 12px; border-radius:5px; border:0; font-size:12px; font-weight:600; cursor:pointer; }
	details.settings button.primary { background:var(--accent); color:#fff; }
	details.settings button.secondary { background:transparent; color:var(--fg); border:1px solid var(--border); }
</style>
</head>
<body>
<div id="app">
	<header><div class="brand">flipagent</div></header>

	<div class="pills">
		<div class="row" id="row-paired"><span class="dot idle"></span><span class="label">…</span></div>
		<div class="row" id="row-buyer"><span class="dot idle"></span><span class="label">…</span></div>
		<div class="row" id="row-seller"><span class="dot idle"></span><span class="label">…</span></div>
	</div>

	<div class="now" id="now" hidden>
		<div class="head">In flight</div>
		<div class="item" id="now-item">…</div>
		<div class="status-line"><span class="ind live" id="now-ind"></span><span id="now-status">…</span></div>
		<div class="meta" id="now-meta"></div>
		<div class="actions">
			<button class="danger" id="now-cancel">Cancel &amp; close tab</button>
		</div>
	</div>

	<section class="feed">
		<h2>Activity</h2>
		<div id="events"><div class="muted">No activity yet. Queue an order from your MCP host (Claude Desktop / Cursor) and watch it land here.</div></div>
	</section>

	<details class="settings" id="setup-details">
		<summary>Settings</summary>
		<div class="body">
			<label for="apiKey">API key</label>
			<input id="apiKey" type="password" placeholder="fa_…" autocomplete="off" />
			<label for="baseUrl">Base URL</label>
			<input id="baseUrl" type="text" placeholder="https://api.flipagent.dev" />
			<label for="deviceName">Device name</label>
			<input id="deviceName" type="text" placeholder="my-mac" />
			<div class="actions">
				<button class="primary" id="save">Save + pair</button>
				<button class="secondary" id="poll">Poll now</button>
				<button class="secondary" id="clear">Disconnect</button>
			</div>
		</div>
	</details>
</div>
<script type="module" src="sidepanel.js"></script>
</body>
</html>
