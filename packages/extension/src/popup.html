<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>flipagent</title>
<link rel="stylesheet" href="popup.css" />
</head>
<body>
<div class="hp">
	<header class="hp-head">
		<div class="hp-brand">
			<img class="hp-brand-mark" src="logo-mark.png" alt="" width="72" height="20" aria-hidden="true" />
			<span class="hp-brand-name">flipagent</span>
		</div>
		<a class="hp-head-link" id="dashboard-link" href="https://flipagent.dev/dashboard" target="_blank" rel="noreferrer" hidden>Dashboard ↗</a>
	</header>

	<section class="hp-setup" id="setup">
		<div class="hp-eyebrow">Setup</div>
		<ul class="hp-step-list" id="step-list"></ul>
	</section>

	<section class="hp-now" id="now" hidden>
		<div class="hp-eyebrow">Now</div>
		<ul class="hp-now-list" id="now-list"></ul>
	</section>

	<footer class="hp-foot" id="signout-foot" hidden>
		<button class="hp-foot-link" id="signout" type="button">Sign out</button>
	</footer>
</div>
<script type="module" src="popup.js"></script>
</body>
</html>
