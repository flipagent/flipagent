name: Check eBay robots.txt drift

on:
  schedule:
    # Daily at 09:00 UTC. Off-peak for eBay's CDN; gives us a working-hours
    # window to react if it fails.
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Check eBay robots.txt against baked-in baseline
        id: check
        run: |
          set +e
          npm run --workspace @flipagent/ebay-scraper check:robots > robots-check.log 2>&1
          status=$?
          set -e
          {
            echo 'log<<__EOF__'
            cat robots-check.log
            echo '__EOF__'
            echo "status=$status"
          } >> "$GITHUB_OUTPUT"
          cat robots-check.log
          exit $status

      - name: Open / update drift issue on failure
        if: failure() && steps.check.outputs.status != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const log = `${{ steps.check.outputs.log }}`;
            const title = 'eBay robots.txt drift detected';
            const bodyHeader = [
              '`@flipagent/ebay-scraper`\'s baked-in robots baseline no longer matches the live file.',
              '',
              'See [`docs/legal/incident-response.md`](../blob/main/docs/legal/incident-response.md)',
              'for the response runbook. Likely action: refresh',
              '`packages/ebay-scraper/data/ebay-robots-baseline.txt`,',
              '`EBAY_RULES` in `robots-guard.ts`, and `EXPECTED_VERSION` in',
              '`scripts/check-robots.ts`. If User-agent: * gained a Disallow',
              'overlapping a path we currently scrape, decide stop-or-document',
              'before merging the baseline refresh.',
              '',
              '## Drift report',
              '',
              '```',
              log.trim(),
              '```',
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'robots-drift',
              per_page: 5,
            });
            const open = existing.data.find((i) => i.title === title);
            if (open) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.number,
                body: bodyHeader,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: bodyHeader,
                labels: ['robots-drift', 'compliance'],
              });
            }
