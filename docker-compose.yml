# Self-host flipagent in one command:
#
#   docker compose up
#
# That gets you postgres + the api on http://localhost:4000. Migrations
# run on boot. To add scraper / Stripe / OAuth credentials, drop them in
# `packages/api/.env` (copy from `.env.example`) — the file is optional;
# compose works without it.
#
# To issue a bootstrap API key once everything's running:
#
#   docker compose exec api node packages/api/dist/scripts/issue-key.js you@example.com

services:
  postgres:
    image: postgres:16-alpine
    container_name: flipagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flipagent
      POSTGRES_PASSWORD: flipagent
      POSTGRES_DB: flipagent
    ports:
      - "55432:5432"
    volumes:
      - flipagent-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flipagent -d flipagent"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: flipagent-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://flipagent:flipagent@postgres:5432/flipagent
      PORT: "4000"
      NODE_ENV: production
      MIGRATE_ON_BOOT: "1"
    env_file:
      - path: packages/api/.env
        required: false
    ports:
      - "4000:4000"
    restart: unless-stopped

volumes:
  flipagent-pgdata:
